<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 380" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f1f5f9" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#6b7280"/></marker>
    <marker id="arr-input" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#2563eb"/></marker>
    <marker id="arr-llm" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#ea580c"/></marker>
    <marker id="arr-model" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#7c3aed"/></marker>
    <marker id="arr-token" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#059669"/></marker>
    <marker id="arr-output" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#059669"/></marker>
    <marker id="arr-gate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#ca8a04"/></marker>
    <marker id="arr-tool" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#0891b2"/></marker>
    <marker id="arr-memory" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#db2777"/></marker>
    <marker id="arr-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#dc2626"/></marker>
  </defs>
  <rect width="1040" height="380" fill="#ffffff"/>
  <rect width="1040" height="380" fill="url(#grid)"/>
  <text x="520" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Scaled Dot-Product Attention — 5단계</text>
  <text x="520" y="60" text-anchor="middle" font-size="12" fill="#64748b">Q · Kᵀ → ÷√d_k → mask → softmax → × V</text>
  <path d="M 217,170 L 231,170" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 365,170 L 379,170" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 513,170 L 527,170" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 661,170 L 675,170" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 809,170 L 823,170" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="85" y="130" width="130" height="100" rx="10" fill="#ffffff"/>
  <rect x="85" y="130" width="130" height="100" rx="10" fill="#e3f2fd" stroke="#2563eb" stroke-width="1.5"/>
  <text x="150.0" y="176.0" text-anchor="middle" font-size="14" font-weight="700" fill="#0d47a1">Q, K, V</text>
  <text x="150.0" y="192.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#1e40af">(B,T,d_k)</text>
  <text x="150.0" y="208.0" text-anchor="middle" font-size="10" fill="#1e40af">입력 3 텐서</text>
  <rect x="233" y="130" width="130" height="100" rx="10" fill="#ffffff"/>
  <rect x="233" y="130" width="130" height="100" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="298.0" y="176.0" text-anchor="middle" font-size="14" font-weight="700" fill="#4c1d95">Q · Kᵀ</text>
  <text x="298.0" y="192.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#6d28d9">matmul</text>
  <text x="298.0" y="208.0" text-anchor="middle" font-size="10" fill="#6d28d9">(B,T,T) 점수</text>
  <rect x="381" y="130" width="130" height="100" rx="10" fill="#ffffff"/>
  <rect x="381" y="130" width="130" height="100" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="446.0" y="176.0" text-anchor="middle" font-size="14" font-weight="700" fill="#713f12">÷ √d_k</text>
  <text x="446.0" y="192.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#a16207">scale</text>
  <text x="446.0" y="208.0" text-anchor="middle" font-size="10" fill="#a16207">분산 안정</text>
  <rect x="529" y="130" width="130" height="100" rx="10" fill="#ffffff"/>
  <rect x="529" y="130" width="130" height="100" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="594.0" y="176.0" text-anchor="middle" font-size="14" font-weight="700" fill="#7f1d1d">causal mask</text>
  <text x="594.0" y="192.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#b91c1c">−∞ 위쪽</text>
  <text x="594.0" y="208.0" text-anchor="middle" font-size="10" fill="#b91c1c">미래 차단</text>
  <rect x="677" y="130" width="130" height="100" rx="10" fill="#ffffff"/>
  <rect x="677" y="130" width="130" height="100" rx="10" fill="#fef3e0" stroke="#ea580c" stroke-width="1.5"/>
  <text x="742.0" y="176.0" text-anchor="middle" font-size="14" font-weight="700" fill="#9a3412">softmax</text>
  <text x="742.0" y="192.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#c2410c">dim=-1</text>
  <text x="742.0" y="208.0" text-anchor="middle" font-size="10" fill="#c2410c">확률 분포</text>
  <rect x="825" y="130" width="130" height="100" rx="10" fill="#ffffff"/>
  <rect x="825" y="130" width="130" height="100" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="890.0" y="176.0" text-anchor="middle" font-size="14" font-weight="700" fill="#064e3b">× V</text>
  <text x="890.0" y="192.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#047857">matmul</text>
  <text x="890.0" y="208.0" text-anchor="middle" font-size="10" fill="#047857">(B,T,d_k) 출력</text>
  <text x="520" y="290" text-anchor="middle" font-size="12" fill="#64748b">PyTorch ≥ 2.0:  out = F.scaled_dot_product_attention(Q, K, V, is_causal=True)</text>
  <text x="520" y="312" text-anchor="middle" font-size="11" fill="#64748b">(내부적으로 FlashAttention 자동 선택 — 같은 결과, 더 빠름)</text>
</svg>