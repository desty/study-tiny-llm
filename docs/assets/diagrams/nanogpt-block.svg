  <text x="80" y="305" font-size="11" font-weight="700" fill="#334155" font-family="JetBrains Mono, monospace">Block 2</text>
  <text x="700" y="220" font-size="10" fill="#334155" font-family="JetBrains Mono, monospace">--- residual</text>
  <text x="450" y="500" text-anchor="middle" font-size="12" fill="#64748b">GPTMini = Block × N (보통 N=6~12) + final RMSNorm + lm_head</text>
