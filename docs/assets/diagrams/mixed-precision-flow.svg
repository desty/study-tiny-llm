  <rect width="1100" height="380" fill="#ffffff"/>
  <rect width="1100" height="380" fill="url(#grid)"/>
  <text x="550" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Mixed Precision + Gradient Accumulation</text>
  <text x="550" y="60" text-anchor="middle" font-size="12" fill="#64748b">bf16 forward · fp32 master copy · 작은 batch × 누적 = 큰 batch 효과</text>
  <rect x="60" y="86" width="300" height="74" rx="8" fill="#e3f2fd" stroke="#2563eb" stroke-width="1.8"/>
  <text x="210" y="106" text-anchor="middle" font-size="12" font-weight="700" fill="#0d47a1">fp32 Master Weight</text>
  <text x="210" y="124" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#1e40af">4 bytes · 정밀한 업데이트</text>
  <text x="210" y="138" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#1e40af">학습률·모멘텀 상태 보관</text>
