  <text x="210" y="212" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#6d28d9">2 bytes · overflow 없음</text>
  <text x="210" y="226" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#6d28d9">(=fp32 지수 범위)</text>
  <text x="210" y="240" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#6d28d9">A100/H100 네이티브 지원</text>
  <rect x="60" y="262" width="300" height="74" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.8"/>
  <text x="210" y="282" text-anchor="middle" font-size="12" font-weight="700" fill="#713f12">fp16 (T4 한정)</text>
  <text x="210" y="300" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#a16207">2 bytes · overflow 위험</text>
  <text x="210" y="314" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#a16207">Loss scaling 필수</text>
