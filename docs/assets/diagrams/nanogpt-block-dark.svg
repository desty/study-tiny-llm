  <text x="310.0" y="311.0" text-anchor="middle" font-size="14" font-weight="700" fill="#fde68a">RMSNorm</text>
  <rect x="390" y="290" width="120" height="50" rx="10" fill="#0f172a"/>
  <rect x="390" y="290" width="120" height="50" rx="10" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="1.5"/>
  <text x="450.0" y="311.0" text-anchor="middle" font-size="14" font-weight="700" fill="#a7f3d0">FFN</text>
  <text x="450.0" y="327.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#34d399">SwiGLU</text>
  <path d="M 580,223 L 310,300" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 310,315 L 370,315" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <circle cx="580" cy="315" r="18" fill="rgba(52,211,153,0.2)" stroke="#34d399" stroke-width="2"/>
  <text x="580" y="321" text-anchor="middle" font-size="20" font-weight="700" fill="#a7f3d0">+</text>
  <path d="M 510,315 L 563,315" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 598 205 L 650 205 L 650 315 L 598 315" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)" stroke-dasharray="3,3"/>
  <path d="M 580,333 L 450,410" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
