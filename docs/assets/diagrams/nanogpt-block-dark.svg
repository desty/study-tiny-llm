  <text x="80" y="200" font-size="11" font-weight="700" fill="#cbd5e1" font-family="JetBrains Mono, monospace">Block 1</text>
  <text x="80" y="305" font-size="11" font-weight="700" fill="#cbd5e1" font-family="JetBrains Mono, monospace">Block 2</text>
  <text x="700" y="220" font-size="10" fill="#cbd5e1" font-family="JetBrains Mono, monospace">--- residual</text>
  <text x="450" y="500" text-anchor="middle" font-size="12" fill="#94a3b8">GPTMini = Block × N (보통 N=6~12) + final RMSNorm + lm_head</text>
