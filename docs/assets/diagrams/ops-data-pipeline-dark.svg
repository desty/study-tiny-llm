<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 360" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#64748b"/></marker>
    <marker id="arr-input" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#60a5fa"/></marker>
    <marker id="arr-llm" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fb923c"/></marker>
    <marker id="arr-model" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#a78bfa"/></marker>
    <marker id="arr-token" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-output" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-gate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fbbf24"/></marker>
    <marker id="arr-tool" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#22d3ee"/></marker>
    <marker id="arr-memory" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f472b6"/></marker>
    <marker id="arr-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f87171"/></marker>
  </defs>
  <rect width="1100" height="360" fill="#020617"/>
  <rect width="1100" height="360" fill="url(#grid)"/>
  <text x="550" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">운영 데이터 파이프라인 — PII · 라벨 · 버전</text>
  <text x="550" y="60" text-anchor="middle" font-size="12" fill="#94a3b8">실로그는 법무·보안·품질 세 게이트를 통과해야 학습 가능</text>
  <rect x="78" y="90" width="168" height="105" rx="10" fill="rgba(248,113,113,0.15)" stroke="#f87171" stroke-width="2"/>
  <text x="162" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#fecaca">원시 실로그</text>
  <text x="162" y="126" text-anchor="middle" font-size="11" fill="#f87171">콜·채팅·CRM</text>
  <line x1="92" y1="134" x2="232" y2="134" stroke="#f87171" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="162" y="150" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#f87171">PII 무더기</text>
  <text x="162" y="166" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#f87171">개인정보 포함</text>
  <path d="M 248,142 L 270,142" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="272" y="90" width="168" height="105" rx="10" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="2"/>
  <text x="356" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#fde68a">PII 마스킹</text>
  <text x="356" y="126" text-anchor="middle" font-size="11" fill="#fbbf24">4단계 필터</text>
  <line x1="286" y1="134" x2="426" y2="134" stroke="#fbbf24" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="356" y="150" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#fbbf24">정규식→NER</text>
  <text x="356" y="166" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#fbbf24">→사람→감사</text>
  <path d="M 442,142 L 464,142" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="466" y="90" width="168" height="105" rx="10" fill="rgba(96,165,250,0.15)" stroke="#60a5fa" stroke-width="2"/>
  <text x="550" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#bfdbfe">합성 라벨</text>
  <text x="550" y="126" text-anchor="middle" font-size="11" fill="#60a5fa">Teacher + 사람</text>
  <line x1="480" y1="134" x2="620" y2="134" stroke="#60a5fa" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="550" y="150" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#60a5fa">LLM 제안</text>
  <text x="550" y="166" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#60a5fa">+ 검수·IAA</text>
  <path d="M 636,142 L 658,142" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="660" y="90" width="168" height="105" rx="10" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="2"/>
  <text x="744" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#ddd6fe">데이터 버전</text>
  <text x="744" y="126" text-anchor="middle" font-size="11" fill="#a78bfa">DVC/MLflow</text>
  <line x1="674" y1="134" x2="814" y2="134" stroke="#a78bfa" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="744" y="150" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#a78bfa">hash 기록</text>
  <text x="744" y="166" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#a78bfa">학습 1:1 추적</text>
  <path d="M 830,142 L 852,142" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="854" y="90" width="168" height="105" rx="10" fill="rgba(52,211,153,0.2)" stroke="#34d399" stroke-width="2"/>
  <text x="938" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#a7f3d0">학습 준비 완료</text>
  <text x="938" y="126" text-anchor="middle" font-size="11" fill="#34d399">배포 허가</text>
  <line x1="868" y1="134" x2="1008" y2="134" stroke="#34d399" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="938" y="150" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#34d399">법무 승인</text>
  <text x="938" y="166" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#34d399">품질 게이트 통과</text>
  <rect x="78" y="223" width="944" height="40" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="550" y="238" text-anchor="middle" font-size="11" font-weight="700" fill="#cbd5e1">IAA (Inter-Annotator Agreement) — Cohen κ ≥ 0.8 기준 · 불일치 = 재학습 신호</text>
  <text x="550" y="254" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#cbd5e1">데이터 버전 = 모델 버전 — 어떤 데이터로 어떤 모델이 나왔는지 1:1 추적</text>
</svg>