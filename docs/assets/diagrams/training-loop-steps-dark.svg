<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 360" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#64748b"/></marker>
    <marker id="arr-input" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#60a5fa"/></marker>
    <marker id="arr-llm" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fb923c"/></marker>
    <marker id="arr-model" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#a78bfa"/></marker>
    <marker id="arr-token" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-output" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-gate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fbbf24"/></marker>
    <marker id="arr-tool" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#22d3ee"/></marker>
    <marker id="arr-memory" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f472b6"/></marker>
    <marker id="arr-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f87171"/></marker>
  </defs>
  <rect width="1100" height="360" fill="#020617"/>
  <rect width="1100" height="360" fill="url(#grid)"/>
  <text x="550" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">한 Step 의 6단계 — 모든 학습 루프의 본체</text>
  <text x="550" y="60" text-anchor="middle" font-size="12" fill="#94a3b8">nanoGPT · Llama · GPT-4 모두 동일 — 분산·precision 만 다름</text>
  <rect x="85" y="88" width="140" height="108" rx="10" fill="rgba(96,165,250,0.15)" stroke="#60a5fa" stroke-width="2"/>
  <circle cx="155" cy="106" r="14" fill="#60a5fa"/>
  <text x="155" y="102" text-anchor="middle" font-size="9" font-weight="700" fill="#020617" font-family="JetBrains Mono, monospace">1</text>
  <text x="155" y="112" text-anchor="middle" font-size="9" font-weight="700" fill="#020617" font-family="JetBrains Mono, monospace">forward</text>
  <text x="155" y="140" text-anchor="middle" font-size="10.5" font-family="JetBrains Mono, monospace" fill="#bfdbfe">logits, loss</text>
  <text x="155" y="154" text-anchor="middle" font-size="10.5" font-family="JetBrains Mono, monospace" fill="#bfdbfe">= model(x, y)</text>
  <text x="155" y="188" text-anchor="middle" font-size="10" fill="#60a5fa">현재 파라미터로 예측</text>
  <path d="M 227,142 L 241,142" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="243" y="88" width="140" height="108" rx="10" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="2"/>
  <circle cx="313" cy="106" r="14" fill="#a78bfa"/>
  <text x="313" y="102" text-anchor="middle" font-size="9" font-weight="700" fill="#020617" font-family="JetBrains Mono, monospace">2</text>
  <text x="313" y="112" text-anchor="middle" font-size="9" font-weight="700" fill="#020617" font-family="JetBrains Mono, monospace">backward</text>
  <text x="313" y="140" text-anchor="middle" font-size="10.5" font-family="JetBrains Mono, monospace" fill="#ddd6fe">loss.backward()</text>
  <text x="313" y="188" text-anchor="middle" font-size="10" fill="#a78bfa">gradient 계산</text>
  <path d="M 385,142 L 399,142" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="401" y="88" width="140" height="108" rx="10" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="2"/>
  <circle cx="471" cy="106" r="14" fill="#fbbf24"/>
  <text x="471" y="102" text-anchor="middle" font-size="9" font-weight="700" fill="#020617" font-family="JetBrains Mono, monospace">3</text>
  <text x="471" y="112" text-anchor="middle" font-size="9" font-weight="700" fill="#020617" font-family="JetBrains Mono, monospace">clip</text>
  <text x="471" y="140" text-anchor="middle" font-size="10.5" font-family="JetBrains Mono, monospace" fill="#fde68a">clip_grad_norm_</text>
  <text x="471" y="154" text-anchor="middle" font-size="10.5" font-family="JetBrains Mono, monospace" fill="#fde68a">(model, 1.0)</text>
  <text x="471" y="188" text-anchor="middle" font-size="10" fill="#fbbf24">발산 방지</text>
  <path d="M 543,142 L 557,142" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="559" y="88" width="140" height="108" rx="10" fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="2"/>
  <circle cx="629" cy="106" r="14" fill="#fb923c"/>
  <text x="629" y="102" text-anchor="middle" font-size="9" font-weight="700" fill="#020617" font-family="JetBrains Mono, monospace">4</text>
  <text x="629" y="112" text-anchor="middle" font-size="9" font-weight="700" fill="#020617" font-family="JetBrains Mono, monospace">step</text>
  <text x="629" y="140" text-anchor="middle" font-size="10.5" font-family="JetBrains Mono, monospace" fill="#fed7aa">optimizer.step()</text>
  <text x="629" y="188" text-anchor="middle" font-size="10" fill="#fb923c">θ -= lr × grad</text>
  <path d="M 701,142 L 715,142" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="717" y="88" width="140" height="108" rx="10" fill="rgba(248,113,113,0.15)" stroke="#f87171" stroke-width="2"/>
  <circle cx="787" cy="106" r="14" fill="#f87171"/>
  <text x="787" y="102" text-anchor="middle" font-size="9" font-weight="700" fill="#020617" font-family="JetBrains Mono, monospace">5</text>
  <text x="787" y="112" text-anchor="middle" font-size="9" font-weight="700" fill="#020617" font-family="JetBrains Mono, monospace">zero_grad</text>
  <text x="787" y="140" text-anchor="middle" font-size="10.5" font-family="JetBrains Mono, monospace" fill="#fecaca">optimizer</text>
  <text x="787" y="154" text-anchor="middle" font-size="10.5" font-family="JetBrains Mono, monospace" fill="#fecaca">.zero_grad()</text>
  <text x="787" y="188" text-anchor="middle" font-size="10" fill="#f87171">다음 step 초기화</text>
  <path d="M 859,142 L 873,142" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="875" y="88" width="140" height="108" rx="10" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="2"/>
  <circle cx="945" cy="106" r="14" fill="#34d399"/>
  <text x="945" y="102" text-anchor="middle" font-size="9" font-weight="700" fill="#020617" font-family="JetBrains Mono, monospace">6</text>
  <text x="945" y="112" text-anchor="middle" font-size="9" font-weight="700" fill="#020617" font-family="JetBrains Mono, monospace">scheduler</text>
  <text x="945" y="140" text-anchor="middle" font-size="10.5" font-family="JetBrains Mono, monospace" fill="#a7f3d0">scheduler.step()</text>
  <text x="945" y="188" text-anchor="middle" font-size="10" fill="#34d399">lr warmup→cosine</text>
  <path d="M 945,198 L 945,218 L 155,218 L 155,198" stroke="#64748b" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="550" y="234" text-anchor="middle" font-size="11" fill="#94a3b8">다음 batch 반복 (수천~수만 step)</text>
</svg>