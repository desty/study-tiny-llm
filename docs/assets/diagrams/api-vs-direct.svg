  <text x="722.0" y="157.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#c2410c">temperature/top-p</text>
  <rect x="805" y="110" width="130" height="70" rx="10" fill="#ffffff"/>
  <rect x="805" y="110" width="130" height="70" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
