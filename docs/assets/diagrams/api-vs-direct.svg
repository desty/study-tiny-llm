  <text x="842.0" y="342.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#be185d">on-device only</text>
  <text x="842.0" y="358.0" text-anchor="middle" font-size="10" fill="#be185d">데이터 외부 X</text>
  <text x="500" y="260" text-anchor="middle" font-size="12" fill="#64748b">직접 forward 면 추가로 보이는 4가지</text>
