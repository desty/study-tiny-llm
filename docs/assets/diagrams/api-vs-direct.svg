  <text x="426.0" y="157.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#6d28d9">attn + ffn</text>
  <rect x="509" y="110" width="130" height="70" rx="10" fill="#ffffff"/>
  <rect x="509" y="110" width="130" height="70" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="574.0" y="141.0" text-anchor="middle" font-size="14" font-weight="700" fill="#713f12">로짓</text>
  <text x="574.0" y="157.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#a16207">logits</text>
  <rect x="657" y="110" width="130" height="70" rx="10" fill="#ffffff"/>
  <rect x="657" y="110" width="130" height="70" rx="10" fill="#fef3e0" stroke="#ea580c" stroke-width="1.5"/>
