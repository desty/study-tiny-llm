  <text x="158.0" y="342.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#047857">len(ids) per req</text>
  <text x="158.0" y="358.0" text-anchor="middle" font-size="10" fill="#047857">한국어 1.5~2× 영어</text>
  <rect x="286" y="280" width="200" height="100" rx="10" fill="#ffffff"/>
  <rect x="286" y="280" width="200" height="100" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="386.0" y="326.0" text-anchor="middle" font-size="14" font-weight="700" fill="#713f12">로짓 분포</text>
  <text x="386.0" y="342.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#a16207">top-k logprobs</text>
  <text x="386.0" y="358.0" text-anchor="middle" font-size="10" fill="#a16207">뾰족 vs 평평</text>
  <rect x="514" y="280" width="200" height="100" rx="10" fill="#ffffff"/>
  <rect x="514" y="280" width="200" height="100" rx="10" fill="#fef3e0" stroke="#ea580c" stroke-width="1.5"/>
  <text x="614.0" y="326.0" text-anchor="middle" font-size="14" font-weight="700" fill="#9a3412">temp / top-p 효과</text>
  <text x="614.0" y="342.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#c2410c">sample(logits, T, p)</text>
  <text x="614.0" y="358.0" text-anchor="middle" font-size="10" fill="#c2410c">5줄 코드</text>
  <rect x="742" y="280" width="200" height="100" rx="10" fill="#ffffff"/>
  <rect x="742" y="280" width="200" height="100" rx="10" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
