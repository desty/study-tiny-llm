  <text x="645.0" y="355.0" text-anchor="middle" font-size="14" font-weight="700" fill="#500724">Attention</text>
  <text x="645.0" y="371.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#be185d">MHA (Q=K=V head)  →  GQA (KV head ↓)</text>
  <text x="645.0" y="387.0" text-anchor="middle" font-size="10" fill="#be185d">추론 KV cache 1/4</text>
