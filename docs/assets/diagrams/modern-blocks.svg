  <text x="520" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">2017 → 2024 — 표준이 된 4 블록</text>
  <text x="520" y="60" text-anchor="middle" font-size="12" fill="#64748b">각각 코드 5~10줄 차이로 효율·메모리·일반화 한 축에서 이김</text>
  <rect x="285" y="110" width="220" height="150" rx="10" fill="#ffffff"/>
  <rect x="285" y="110" width="220" height="150" rx="10" fill="#e3f2fd" stroke="#2563eb" stroke-width="1.5"/>
  <text x="395.0" y="181.0" text-anchor="middle" font-size="14" font-weight="700" fill="#0d47a1">위치 인코딩</text>
  <text x="395.0" y="197.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#1e40af">sinusoidal PE  →  RoPE</text>
  <text x="395.0" y="213.0" text-anchor="middle" font-size="10" fill="#1e40af">길이 외삽 가능</text>
  <rect x="535" y="110" width="220" height="150" rx="10" fill="#ffffff"/>
  <rect x="535" y="110" width="220" height="150" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="645.0" y="181.0" text-anchor="middle" font-size="14" font-weight="700" fill="#713f12">정규화</text>
  <text x="645.0" y="197.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#a16207">LayerNorm  →  RMSNorm</text>
  <text x="645.0" y="213.0" text-anchor="middle" font-size="10" fill="#a16207">7~10% 빠름, 같은 성능</text>
  <rect x="285" y="284" width="220" height="150" rx="10" fill="#ffffff"/>
  <rect x="285" y="284" width="220" height="150" rx="10" fill="#fef3e0" stroke="#ea580c" stroke-width="1.5"/>
  <text x="395.0" y="355.0" text-anchor="middle" font-size="14" font-weight="700" fill="#9a3412">FFN 활성</text>
  <text x="395.0" y="371.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#c2410c">GeLU  →  SwiGLU</text>
  <text x="395.0" y="387.0" text-anchor="middle" font-size="10" fill="#c2410c">게이팅으로 표현력 ↑</text>
