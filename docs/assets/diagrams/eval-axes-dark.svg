<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 380" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#64748b"/></marker>
    <marker id="arr-input" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#60a5fa"/></marker>
    <marker id="arr-llm" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fb923c"/></marker>
    <marker id="arr-model" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#a78bfa"/></marker>
    <marker id="arr-token" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-output" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-gate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fbbf24"/></marker>
    <marker id="arr-tool" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#22d3ee"/></marker>
    <marker id="arr-memory" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f472b6"/></marker>
    <marker id="arr-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f87171"/></marker>
  </defs>
  <rect width="1100" height="380" fill="#020617"/>
  <rect width="1100" height="380" fill="url(#grid)"/>
  <text x="550" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">운영 평가 5축 — 회귀 · OOD · Adversarial · A/B · Hold-out</text>
  <text x="550" y="60" text-anchor="middle" font-size="12" fill="#94a3b8">배포 전 5축 모두 통과 — 회귀 0% 필수, A/B 는 트래픽 신호</text>
  <rect x="84" y="88" width="172" height="148" rx="10" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="2"/>
  <text x="170" y="106" text-anchor="middle" font-size="12" font-weight="700" fill="#ddd6fe">Hold-out</text>
  <text x="170" y="120" text-anchor="middle" font-size="12" font-weight="700" fill="#ddd6fe">(Ch 16~18)</text>
  <text x="170" y="138" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#a78bfa">PPL · 벤치마크</text>
  <text x="170" y="152" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#a78bfa">생성 샘플</text>
  <line x1="96" y1="168" x2="244" y2="168" stroke="#a78bfa" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="170" y="184" text-anchor="middle" font-size="10" fill="#ddd6fe">학습 분포 내</text>
  <text x="170" y="197" text-anchor="middle" font-size="10" fill="#ddd6fe">능력 측정</text>
  <text x="170" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#a78bfa">베이스라인</text>
  <rect x="274" y="88" width="172" height="148" rx="10" fill="rgba(96,165,250,0.15)" stroke="#60a5fa" stroke-width="2"/>
  <text x="360" y="106" text-anchor="middle" font-size="12" font-weight="700" fill="#bfdbfe">회귀셋</text>
  <text x="360" y="138" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#60a5fa">이전 버전</text>
  <text x="360" y="152" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#60a5fa">100~500건</text>
  <line x1="286" y1="168" x2="434" y2="168" stroke="#60a5fa" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="360" y="184" text-anchor="middle" font-size="10" fill="#bfdbfe">0% 회귀 필수</text>
  <text x="360" y="197" text-anchor="middle" font-size="10" fill="#bfdbfe">1개라도 깨지면 차단</text>
  <text x="360" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#60a5fa">배포 게이트</text>
  <rect x="464" y="88" width="172" height="148" rx="10" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="2"/>
  <text x="550" y="106" text-anchor="middle" font-size="12" font-weight="700" fill="#fde68a">OOD</text>
  <text x="550" y="138" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#fbbf24">학습 외 분포</text>
  <text x="550" y="152" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#fbbf24">새로운 패턴</text>
  <line x1="476" y1="168" x2="624" y2="168" stroke="#fbbf24" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="550" y="184" text-anchor="middle" font-size="10" fill="#fde68a">일반화 능력</text>
  <text x="550" y="197" text-anchor="middle" font-size="10" fill="#fde68a">측정</text>
  <text x="550" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#fbbf24">경고 기준</text>
  <rect x="654" y="88" width="172" height="148" rx="10" fill="rgba(248,113,113,0.15)" stroke="#f87171" stroke-width="2"/>
  <text x="740" y="106" text-anchor="middle" font-size="12" font-weight="700" fill="#fecaca">Adversarial</text>
  <text x="740" y="138" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#f87171">의도적 함정</text>
  <text x="740" y="152" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#f87171">공격 패턴</text>
  <line x1="666" y1="168" x2="814" y2="168" stroke="#f87171" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="740" y="184" text-anchor="middle" font-size="10" fill="#fecaca">안전성·강건성</text>
  <text x="740" y="197" text-anchor="middle" font-size="10" fill="#fecaca">측정</text>
  <text x="740" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#f87171">보안 게이트</text>
  <rect x="844" y="88" width="172" height="148" rx="10" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="2"/>
  <text x="930" y="106" text-anchor="middle" font-size="12" font-weight="700" fill="#a7f3d0">A/B 테스트</text>
  <text x="930" y="138" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#34d399">실 트래픽 5~10%</text>
  <text x="930" y="152" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#34d399">분기</text>
  <line x1="856" y1="168" x2="1004" y2="168" stroke="#34d399" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="930" y="184" text-anchor="middle" font-size="10" fill="#a7f3d0">사용자 신호</text>
  <text x="930" y="197" text-anchor="middle" font-size="10" fill="#a7f3d0">만족도</text>
  <text x="930" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#34d399">최종 확정</text>
  <text x="550" y="360" text-anchor="middle" font-size="11" fill="#94a3b8">회귀 = 하드 블로커 | OOD·Adversarial = 경고 | A/B = 트래픽 신호 | Hold-out = 능력 측정</text>
</svg>