  <text x="170" y="197" text-anchor="middle" font-size="10" fill="#4c1d95">능력 측정</text>
  <text x="170" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#6d28d9">베이스라인</text>
  <rect x="274" y="88" width="172" height="148" rx="10" fill="#e3f2fd" stroke="#2563eb" stroke-width="2"/>
  <text x="360" y="106" text-anchor="middle" font-size="12" font-weight="700" fill="#0d47a1">회귀셋</text>
  <text x="360" y="138" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#1e40af">이전 버전</text>
  <text x="360" y="152" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#1e40af">100~500건</text>
  <line x1="286" y1="168" x2="434" y2="168" stroke="#2563eb" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="360" y="184" text-anchor="middle" font-size="10" fill="#0d47a1">0% 회귀 필수</text>
  <text x="360" y="197" text-anchor="middle" font-size="10" fill="#0d47a1">1개라도 깨지면 차단</text>
  <text x="360" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#1e40af">배포 게이트</text>
  <rect x="464" y="88" width="172" height="148" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="550" y="106" text-anchor="middle" font-size="12" font-weight="700" fill="#713f12">OOD</text>
  <text x="550" y="138" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#a16207">학습 외 분포</text>
  <text x="550" y="152" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#a16207">새로운 패턴</text>
  <line x1="476" y1="168" x2="624" y2="168" stroke="#ca8a04" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="550" y="184" text-anchor="middle" font-size="10" fill="#713f12">일반화 능력</text>
  <text x="550" y="197" text-anchor="middle" font-size="10" fill="#713f12">측정</text>
  <text x="550" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#a16207">경고 기준</text>
  <rect x="654" y="88" width="172" height="148" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="740" y="106" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Adversarial</text>
  <text x="740" y="138" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#b91c1c">의도적 함정</text>
  <text x="740" y="152" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#b91c1c">공격 패턴</text>
  <line x1="666" y1="168" x2="814" y2="168" stroke="#dc2626" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="740" y="184" text-anchor="middle" font-size="10" fill="#7f1d1d">안전성·강건성</text>
  <text x="740" y="197" text-anchor="middle" font-size="10" fill="#7f1d1d">측정</text>
  <text x="740" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#b91c1c">보안 게이트</text>
  <rect x="844" y="88" width="172" height="148" rx="10" fill="#dcfce7" stroke="#059669" stroke-width="2"/>
  <text x="930" y="106" text-anchor="middle" font-size="12" font-weight="700" fill="#064e3b">A/B 테스트</text>
  <text x="930" y="138" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#047857">실 트래픽 5~10%</text>
  <text x="930" y="152" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#047857">분기</text>
  <line x1="856" y1="168" x2="1004" y2="168" stroke="#059669" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="930" y="184" text-anchor="middle" font-size="10" fill="#064e3b">사용자 신호</text>
  <text x="930" y="197" text-anchor="middle" font-size="10" fill="#064e3b">만족도</text>
  <text x="930" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#047857">최종 확정</text>
  <text x="550" y="360" text-anchor="middle" font-size="11" fill="#64748b">회귀 = 하드 블로커 | OOD·Adversarial = 경고 | A/B = 트래픽 신호 | Hold-out = 능력 측정</text>
</svg>