  <text x="210.0" y="274.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#047857">3B ~ 7B</text>
  <text x="210.0" y="290.0" text-anchor="middle" font-size="10" fill="#047857">Phi-3-mini / Qwen 2.5-3B</text>
  <rect x="60" y="321" width="300" height="98" rx="10" fill="#ffffff"/>
  <rect x="60" y="321" width="300" height="98" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="210.0" y="366.0" text-anchor="middle" font-size="14" font-weight="700" fill="#4c1d95">단일 A100 (80GB)</text>
  <text x="210.0" y="382.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#6d28d9">8B ~ 30B</text>
  <text x="210.0" y="398.0" text-anchor="middle" font-size="10" fill="#6d28d9">Llama 3 8B / Phi-3-medium</text>
  <rect x="60" y="429" width="300" height="98" rx="10" fill="#ffffff"/>
  <rect x="60" y="429" width="300" height="98" rx="10" fill="#fef3e0" stroke="#ea580c" stroke-width="1.5"/>
  <text x="210.0" y="474.0" text-anchor="middle" font-size="14" font-weight="700" fill="#9a3412">큰 GPU + 양자화</text>
  <text x="210.0" y="490.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#c2410c">70B (int4)</text>
  <text x="210.0" y="506.0" text-anchor="middle" font-size="10" fill="#c2410c">Llama 3 70B / Qwen 2.5-72B</text>
  <text x="740" y="100" text-anchor="middle" font-size="14" fill="#64748b">dense  vs  MoE</text>
  <rect x="460" y="130" width="320" height="110" rx="10" fill="#ffffff"/>
  <rect x="460" y="130" width="320" height="110" rx="10" fill="#dcfce7" stroke="#059669" stroke-width="1.5"/>
  <text x="620.0" y="181.0" text-anchor="middle" font-size="14" font-weight="700" fill="#064e3b">dense</text>
  <text x="620.0" y="197.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#047857">모든 파라미터 활성</text>
  <text x="620.0" y="213.0" text-anchor="middle" font-size="10" fill="#047857">Llama 3 70B = 70B 메모리 + 70B 속도</text>
  <rect x="790" y="130" width="320" height="110" rx="10" fill="#ffffff"/>
  <rect x="790" y="130" width="320" height="110" rx="10" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="950.0" y="181.0" text-anchor="middle" font-size="14" font-weight="700" fill="#500724">MoE</text>
  <text x="950.0" y="197.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#be185d">router 가 k 개 expert 만</text>
  <text x="950.0" y="213.0" text-anchor="middle" font-size="10" fill="#be185d">Mixtral 8×7B = 47B 메모리 + 13B 속도</text>
  <text x="740" y="260" text-anchor="middle" font-size="11" fill="#64748b">같은 표기 모델 둘 — 메모리 vs 속도 비교</text>
  <text x="472" y="282" font-size="11" fill="#0f172a">Llama 3 70B (dense)</text>
  <text x="700" y="282" font-size="11" font-family="JetBrains Mono, monospace" fill="#be185d">140 GB</text>
  <text x="820" y="282" font-size="11" font-family="JetBrains Mono, monospace" fill="#047857">70B 속도</text>
  <text x="472" y="308" font-size="11" fill="#0f172a">Mixtral 8×7B (MoE)</text>
  <text x="700" y="308" font-size="11" font-family="JetBrains Mono, monospace" fill="#be185d">90 GB</text>
  <text x="820" y="308" font-size="11" font-family="JetBrains Mono, monospace" fill="#047857">13B 속도</text>
  <text x="472" y="334" font-size="11" fill="#0f172a">DeepSeek-V3 (MoE)</text>
  <text x="700" y="334" font-size="11" font-family="JetBrains Mono, monospace" fill="#be185d">671B 메모리</text>
  <text x="820" y="334" font-size="11" font-family="JetBrains Mono, monospace" fill="#047857">37B 속도</text>
  <rect x="60" y="470" width="300" height="70" rx="10" fill="#ffffff"/>
  <rect x="60" y="470" width="300" height="70" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="210.0" y="501.0" text-anchor="middle" font-size="14" font-weight="700" fill="#064e3b">본 책 from-scratch</text>
  <text x="210.0" y="517.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#047857">10M dense decoder</text>
  <text x="210.0" y="533.0" text-anchor="middle" font-size="10" fill="#047857">어디든 들어가는 작은 디코더</text>
  <rect x="570" y="470" width="330" height="70" rx="10" fill="#ffffff"/>
  <rect x="570" y="470" width="330" height="70" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="735.0" y="501.0" text-anchor="middle" font-size="14" font-weight="700" fill="#713f12">본 책 캡스톤 (LoRA)</text>
  <text x="735.0" y="517.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#a16207">Qwen 2.5-0.5B + 어댑터</text>
  <text x="735.0" y="533.0" text-anchor="middle" font-size="10" fill="#a16207">기성 + 본인 도메인</text>
