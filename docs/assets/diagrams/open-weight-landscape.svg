  <rect width="1100" height="540" fill="#ffffff"/>
  <rect width="1100" height="540" fill="url(#grid)"/>
  <text x="550" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">오픈 웨이트 SLM 풍경 — 디바이스 사다리 + dense/MoE</text>
  <text x="550" y="60" text-anchor="middle" font-size="12" fill="#64748b">크기는 디바이스에 맞춘 정확한 컷. MoE 는 메모리 / 활성 두 숫자.</text>
  <rect x="60" y="105" width="300" height="98" rx="10" fill="#ffffff"/>
  <rect x="60" y="105" width="300" height="98" rx="10" fill="#e3f2fd" stroke="#2563eb" stroke-width="1.5"/>
  <text x="210.0" y="150.0" text-anchor="middle" font-size="14" font-weight="700" fill="#0d47a1">모바일 (4GB)</text>
  <text x="210.0" y="166.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#1e40af">0.5B ~ 2B</text>
  <text x="210.0" y="182.0" text-anchor="middle" font-size="10" fill="#1e40af">Llama 3.2-1B / Gemma 2-2B</text>
  <rect x="60" y="213" width="300" height="98" rx="10" fill="#ffffff"/>
  <rect x="60" y="213" width="300" height="98" rx="10" fill="#dcfce7" stroke="#059669" stroke-width="1.5"/>
