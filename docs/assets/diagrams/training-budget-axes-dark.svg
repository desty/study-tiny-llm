<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 380" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#64748b"/></marker>
    <marker id="arr-input" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#60a5fa"/></marker>
    <marker id="arr-llm" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fb923c"/></marker>
    <marker id="arr-model" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#a78bfa"/></marker>
    <marker id="arr-token" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-output" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-gate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fbbf24"/></marker>
    <marker id="arr-tool" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#22d3ee"/></marker>
    <marker id="arr-memory" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f472b6"/></marker>
    <marker id="arr-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f87171"/></marker>
  </defs>
  <rect width="1100" height="380" fill="#020617"/>
  <rect width="1100" height="380" fill="url(#grid)"/>
  <text x="550" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">학습 가능 3축 — 메모리 · 연산 · 시간</text>
  <text x="550" y="60" text-anchor="middle" font-size="12" fill="#94a3b8">셋 모두 통과해야 "가능" — 하나라도 실패하면 설계 변경</text>
  <rect x="100" y="88" width="280" height="160" rx="10" fill="rgba(248,113,113,0.15)" stroke="#f87171" stroke-width="2"/>
  <text x="240" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#fecaca">메모리</text>
  <text x="240" y="126" text-anchor="middle" font-size="10" font-weight="700" font-family="JetBrains Mono, monospace" fill="#f87171">OOM
= Out of Memory</text>
  <line x1="116" y1="132" x2="364" y2="132" stroke="#f87171" stroke-width="0.6" stroke-dasharray="4,3"/>
  <text x="240" y="150" text-anchor="middle" font-size="11" fill="#fecaca">모델 파라미터 + 옵티마이저 상태</text>
  <text x="240" y="164" text-anchor="middle" font-size="11" fill="#fecaca">+ activation + gradient</text>
  <text x="240" y="200" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#f87171">10M fp16 = 20MB</text>
  <text x="240" y="214" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#f87171">AdamW 상태 ×3 = 60MB</text>
  <text x="240" y="228" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#f87171">activation ∝ batch·seq</text>
  <rect x="410" y="88" width="280" height="160" rx="10" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="2"/>
  <text x="550" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#fde68a">연산 (FLOPs)</text>
  <text x="550" y="126" text-anchor="middle" font-size="10" font-weight="700" font-family="JetBrains Mono, monospace" fill="#fbbf24">끝나지 않는 학습</text>
  <line x1="426" y1="132" x2="674" y2="132" stroke="#fbbf24" stroke-width="0.6" stroke-dasharray="4,3"/>
  <text x="550" y="150" text-anchor="middle" font-size="11" fill="#fde68a">학습 FLOPs ≈ 6 × N × D</text>
  <text x="550" y="164" text-anchor="middle" font-size="11" fill="#fde68a">N=파라미터수, D=토큰수</text>
  <text x="550" y="200" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#fbbf24">10M × 200M토큰</text>
  <text x="550" y="214" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#fbbf24">≈ 1.2×10¹⁵ FLOPs</text>
  <text x="550" y="228" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#fbbf24">T4=~10¹³ FLOP/s → ~2h</text>
  <rect x="720" y="88" width="280" height="160" rx="10" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="2"/>
  <text x="860" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#a7f3d0">시간</text>
  <text x="860" y="126" text-anchor="middle" font-size="10" font-weight="700" font-family="JetBrains Mono, monospace" fill="#34d399">일정 초과</text>
  <line x1="736" y1="132" x2="984" y2="132" stroke="#34d399" stroke-width="0.6" stroke-dasharray="4,3"/>
  <text x="860" y="150" text-anchor="middle" font-size="11" fill="#a7f3d0">메모리 × 연산의 함수</text>
  <text x="860" y="164" text-anchor="middle" font-size="11" fill="#a7f3d0">단위 시간 처리량 =</text>
  <text x="860" y="178" text-anchor="middle" font-size="11" fill="#a7f3d0">tokens/sec</text>
  <text x="860" y="200" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#34d399">노트북: 5K tok/s</text>
  <text x="860" y="214" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#34d399">4h 학습: ~72M 토큰</text>
  <text x="860" y="228" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#34d399">≈ TinyStories 1/3</text>
  <rect x="100" y="276" width="900" height="40" rx="8" fill="rgba(52,211,153,0.2)" stroke="#34d399" stroke-width="1.5"/>
  <text x="550" y="292" text-anchor="middle" font-size="13" font-weight="700" fill="#a7f3d0">본 책 기준선: 10M · 200M 토큰 · M1/M2 또는 Colab T4 · 약 4시간</text>
  <text x="550" y="308" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#34d399">세 축 동시 검사 → 사전에 산수 한 번 → OOM 12시간 손실 방지</text>
</svg>