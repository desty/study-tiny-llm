  <rect width="1100" height="380" fill="#020617"/>
  <rect width="1100" height="380" fill="url(#grid)"/>
  <text x="550" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">Mixed Precision + Gradient Accumulation</text>
  <text x="550" y="60" text-anchor="middle" font-size="12" fill="#94a3b8">bf16 forward · fp32 master copy · 작은 batch × 누적 = 큰 batch 효과</text>
  <rect x="60" y="86" width="300" height="74" rx="8" fill="rgba(96,165,250,0.15)" stroke="#60a5fa" stroke-width="1.8"/>
  <text x="210" y="106" text-anchor="middle" font-size="12" font-weight="700" fill="#bfdbfe">fp32 Master Weight</text>
  <text x="210" y="124" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#60a5fa">4 bytes · 정밀한 업데이트</text>
  <text x="210" y="138" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#60a5fa">학습률·모멘텀 상태 보관</text>
  <rect x="60" y="174" width="300" height="74" rx="8" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="1.8"/>
  <text x="210" y="194" text-anchor="middle" font-size="12" font-weight="700" fill="#ddd6fe">bf16 Forward/Backward</text>
  <text x="210" y="212" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#a78bfa">2 bytes · overflow 없음</text>
  <text x="210" y="226" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#a78bfa">(=fp32 지수 범위)</text>
  <text x="210" y="240" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#a78bfa">A100/H100 네이티브 지원</text>
  <rect x="60" y="262" width="300" height="74" rx="8" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="1.8"/>
  <text x="210" y="282" text-anchor="middle" font-size="12" font-weight="700" fill="#fde68a">fp16 (T4 한정)</text>
  <text x="210" y="300" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#fbbf24">2 bytes · overflow 위험</text>
  <text x="210" y="314" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#fbbf24">Loss scaling 필수</text>
  <text x="210" y="328" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#fbbf24">T4 bf16 미지원</text>
  <text x="210" y="360" text-anchor="middle" font-size="10" fill="#94a3b8">autocast(device_type, dtype=torch.bfloat16)</text>
  <text x="740" y="76" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">Gradient Accumulation</text>
  <text x="740" y="92" text-anchor="middle" font-size="10" fill="#94a3b8">batch=4, accum=8 → effective batch=32</text>
