  <text x="426.0" y="157.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#a78bfa">attn + ffn</text>
  <rect x="509" y="110" width="130" height="70" rx="10" fill="#0f172a"/>
  <rect x="509" y="110" width="130" height="70" rx="10" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="1.5"/>
