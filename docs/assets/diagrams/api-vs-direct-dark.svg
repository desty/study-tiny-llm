  <text x="500" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">API 호출 vs 직접 forward — 무엇이 보이나</text>
  <text x="500" y="60" text-anchor="middle" font-size="12" fill="#94a3b8">회색 영역은 API 사용자에게 black box. 직접 굴리면 그 경계가 사라진다.</text>
  <rect x="201" y="86" width="598" height="104" rx="12" fill="rgba(248,113,113,0.05)" stroke="#f87171" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="213" y="104" font-size="10" font-weight="700" fill="#f87171" font-family="JetBrains Mono, monospace">API 사용자에게는 black box</text>
