  <text x="158.0" y="342.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#34d399">len(ids) per req</text>
  <text x="158.0" y="358.0" text-anchor="middle" font-size="10" fill="#34d399">한국어 1.5~2× 영어</text>
  <rect x="286" y="280" width="200" height="100" rx="10" fill="#0f172a"/>
  <rect x="286" y="280" width="200" height="100" rx="10" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="386.0" y="326.0" text-anchor="middle" font-size="14" font-weight="700" fill="#fde68a">로짓 분포</text>
  <text x="386.0" y="342.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#fbbf24">top-k logprobs</text>
  <text x="386.0" y="358.0" text-anchor="middle" font-size="10" fill="#fbbf24">뾰족 vs 평평</text>
