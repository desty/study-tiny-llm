  <text x="360" y="196" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#fb923c">Qwen 1.5B</text>
  <rect x="470" y="130" width="160" height="100" rx="10" fill="rgba(248,113,113,0.15)" stroke="#f87171" stroke-width="1.5"/>
