<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 460" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#64748b"/></marker>
    <marker id="arr-input" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#60a5fa"/></marker>
    <marker id="arr-llm" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fb923c"/></marker>
    <marker id="arr-model" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#a78bfa"/></marker>
    <marker id="arr-token" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-output" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-gate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fbbf24"/></marker>
    <marker id="arr-tool" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#22d3ee"/></marker>
    <marker id="arr-memory" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f472b6"/></marker>
    <marker id="arr-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f87171"/></marker>
  </defs>
  <rect width="1040" height="460" fill="#020617"/>
  <rect width="1040" height="460" fill="url(#grid)"/>
  <text x="520" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">2017 → 2024 — 표준이 된 4 블록</text>
  <text x="520" y="60" text-anchor="middle" font-size="12" fill="#94a3b8">각각 코드 5~10줄 차이로 효율·메모리·일반화 한 축에서 이김</text>
  <rect x="285" y="110" width="220" height="150" rx="10" fill="#0f172a"/>
  <rect x="285" y="110" width="220" height="150" rx="10" fill="rgba(96,165,250,0.15)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="395.0" y="181.0" text-anchor="middle" font-size="14" font-weight="700" fill="#bfdbfe">위치 인코딩</text>
  <text x="395.0" y="197.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#60a5fa">sinusoidal PE  →  RoPE</text>
  <text x="395.0" y="213.0" text-anchor="middle" font-size="10" fill="#60a5fa">길이 외삽 가능</text>
  <rect x="535" y="110" width="220" height="150" rx="10" fill="#0f172a"/>
  <rect x="535" y="110" width="220" height="150" rx="10" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="645.0" y="181.0" text-anchor="middle" font-size="14" font-weight="700" fill="#fde68a">정규화</text>
  <text x="645.0" y="197.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#fbbf24">LayerNorm  →  RMSNorm</text>
  <text x="645.0" y="213.0" text-anchor="middle" font-size="10" fill="#fbbf24">7~10% 빠름, 같은 성능</text>
  <rect x="285" y="284" width="220" height="150" rx="10" fill="#0f172a"/>
  <rect x="285" y="284" width="220" height="150" rx="10" fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="395.0" y="355.0" text-anchor="middle" font-size="14" font-weight="700" fill="#fed7aa">FFN 활성</text>
  <text x="395.0" y="371.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#fb923c">GeLU  →  SwiGLU</text>
  <text x="395.0" y="387.0" text-anchor="middle" font-size="10" fill="#fb923c">게이팅으로 표현력 ↑</text>
  <rect x="535" y="284" width="220" height="150" rx="10" fill="#0f172a"/>
  <rect x="535" y="284" width="220" height="150" rx="10" fill="rgba(244,114,182,0.15)" stroke="#f472b6" stroke-width="1.5"/>
  <text x="645.0" y="355.0" text-anchor="middle" font-size="14" font-weight="700" fill="#fbcfe8">Attention</text>
  <text x="645.0" y="371.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#f472b6">MHA (Q=K=V head)  →  GQA (KV head ↓)</text>
  <text x="645.0" y="387.0" text-anchor="middle" font-size="10" fill="#f472b6">추론 KV cache 1/4</text>
</svg>