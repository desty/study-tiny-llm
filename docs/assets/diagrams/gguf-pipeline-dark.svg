<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 360" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#64748b"/></marker>
    <marker id="arr-input" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#60a5fa"/></marker>
    <marker id="arr-llm" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fb923c"/></marker>
    <marker id="arr-model" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#a78bfa"/></marker>
    <marker id="arr-token" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-output" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-gate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fbbf24"/></marker>
    <marker id="arr-tool" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#22d3ee"/></marker>
    <marker id="arr-memory" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f472b6"/></marker>
    <marker id="arr-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f87171"/></marker>
  </defs>
  <rect width="1100" height="360" fill="#020617"/>
  <rect width="1100" height="360" fill="url(#grid)"/>
  <text x="550" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">HF → GGUF 변환 파이프라인</text>
  <text x="550" y="60" text-anchor="middle" font-size="12" fill="#94a3b8">모델 + 토크나이저 + 메타데이터를 단일 파일로 — llama.cpp 표준 포맷</text>
  <rect x="110" y="100" width="190" height="100" rx="10" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="2"/>
  <text x="205" y="122" text-anchor="middle" font-size="13" font-weight="700" fill="#ddd6fe">HF 체크포인트</text>
  <text x="205" y="138" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#a78bfa">final.pt</text>
  <text x="205" y="162" text-anchor="middle" font-size="11" font-weight="700" fill="#ddd6fe">PyTorch</text>
  <text x="205" y="176" text-anchor="middle" font-size="11" font-weight="700" fill="#ddd6fe">state_dict</text>
  <path d="M 302,150 L 338,150" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="340" y="100" width="190" height="100" rx="10" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="2"/>
  <text x="435" y="122" text-anchor="middle" font-size="13" font-weight="700" fill="#fde68a">convert_hf_to_gguf</text>
  <text x="435" y="138" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#fbbf24">llama.cpp 스크립트</text>
  <text x="435" y="162" text-anchor="middle" font-size="11" font-weight="700" fill="#fde68a">FP16 GGUF</text>
  <text x="435" y="176" text-anchor="middle" font-size="11" font-weight="700" fill="#fde68a">(무손실)</text>
  <path d="M 532,150 L 568,150" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="570" y="100" width="190" height="100" rx="10" fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="2"/>
  <text x="665" y="122" text-anchor="middle" font-size="13" font-weight="700" fill="#fed7aa">quantize</text>
  <text x="665" y="138" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#fb923c">llama-quantize</text>
  <text x="665" y="162" text-anchor="middle" font-size="11" font-weight="700" fill="#fed7aa">Q4_K_M GGUF</text>
  <text x="665" y="176" text-anchor="middle" font-size="11" font-weight="700" fill="#fed7aa">(int4 압축)</text>
  <path d="M 762,150 L 798,150" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="800" y="100" width="190" height="100" rx="10" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="2"/>
  <text x="895" y="122" text-anchor="middle" font-size="13" font-weight="700" fill="#a7f3d0">llama-cli</text>
  <text x="895" y="138" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#34d399">llama-cli -m 모델.gguf</text>
  <text x="895" y="162" text-anchor="middle" font-size="11" font-weight="700" fill="#a7f3d0">즉시 추론</text>
  <text x="895" y="176" text-anchor="middle" font-size="11" font-weight="700" fill="#a7f3d0">노트북에서</text>
  <text x="205" y="226" text-anchor="middle" font-size="11" font-weight="700" font-family="JetBrains Mono, monospace" fill="#a78bfa">20 MB</text>
  <text x="205" y="241" text-anchor="middle" font-size="11" font-weight="500" font-family="JetBrains Mono, monospace" fill="#a78bfa">(fp16)</text>
  <text x="435" y="226" text-anchor="middle" font-size="11" font-weight="700" font-family="JetBrains Mono, monospace" fill="#fbbf24">20 MB</text>
  <text x="435" y="241" text-anchor="middle" font-size="11" font-weight="500" font-family="JetBrains Mono, monospace" fill="#fbbf24">(fp16 GGUF)</text>
  <text x="665" y="226" text-anchor="middle" font-size="11" font-weight="700" font-family="JetBrains Mono, monospace" fill="#fb923c">5 MB</text>
  <text x="665" y="241" text-anchor="middle" font-size="11" font-weight="500" font-family="JetBrains Mono, monospace" fill="#fb923c">(Q4_K_M)</text>
  <text x="895" y="226" text-anchor="middle" font-size="11" font-weight="700" font-family="JetBrains Mono, monospace" fill="#34d399">실행</text>
  <rect x="110" y="272" width="880" height="34" rx="6" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="550" y="286" text-anchor="middle" font-size="11" font-weight="700" fill="#cbd5e1">GGUF 한 파일 안: magic "GGUF" · metadata · vocab+merges · 양자화 가중치</text>
  <text x="550" y="300" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#cbd5e1">config.json + tokenizer.json + state_dict → 단 하나의 .gguf 파일</text>
</svg>