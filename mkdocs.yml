  - Part 1. 왜 작은 모델인가:
      - 작은 모델의 부활: part1/01-return-of-slm.md
      - API와 무엇이 다른가: part1/02-vs-api.md
      - 노트북에서 가능한 것: part1/03-laptop-budget.md
      - 오픈 웨이트 SLM 풍경 — 크기 · dense · MoE: part1/04-open-weight-landscape.md
  - Part 2. 데이터 · 토크나이저:
